<div class="login-page" dir="rtl">

    <!-- Background Glow -->
    <div class="bg-blur blur-1"></div>
    <div class="bg-blur blur-2"></div>

    <div class="login-card">

        <!-- Brand -->
        <div class="brand-section">

            <div class="brand-circle">
                <span class="logo-font">ي</span>
            </div>

            <h1 class="logo-font">
                يُدنِين
            </h1>

            <p>
                لوحة تحكم المتجر
            </p>

        </div>

        <!-- Form -->
        <form [formGroup]="loginForm" (ngSubmit)="login()" class="login-form">

            <div class="form-group">

                <label>
                    اسم المستخدم
                </label>

                <div class="input-wrapper">

                    <i class="fas fa-user"></i>

                    <input type="text" formControlName="userName" placeholder="أدخل اسم المستخدم" />

                </div>

            </div>

            <div class="form-group">

                <label>
                    كلمة المرور
                </label>

                <div class="input-wrapper">

                    <i class="fas fa-lock"></i>

                    <input type="password" formControlName="password" placeholder="أدخل كلمة المرور" />

                </div>

            </div>

            <div class="error-msg" *ngIf="errorMessage">
                <i class="fas fa-circle-exclamation"></i>

                {{ errorMessage }}
            </div>

            <button type="submit" class="login-btn" [disabled]="isLoading">

                <span *ngIf="!isLoading">
                    تسجيل الدخول
                </span>

                <span *ngIf="isLoading">
                    جاري التحقق...
                </span>

            </button>

        </form>

    </div>

</div>
