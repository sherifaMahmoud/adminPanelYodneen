<div class="container mt-5" dir="rtl">
  <div class="shadow-sm">
    <div>
      <h3 class="mb-0">إدارة الأصناف</h3>
    </div>
    <div class="card-body">
      <div class="row mb-4">
        <div class="col-md-8">
          <input
            type="text"
            [(ngModel)]="newCategory.name"
            class="form-control form-control-lg"
            placeholder="أدخل اسم الصنف الجديد"
            (keyup.enter)="addCategory()"
          >
        </div>
        <div class="col-md-4">
          <button
            class="btn btn-maroon w-100 h-100"
            (click)="addCategory()"
            [disabled]="!newCategory.name.trim()"
          >
            <i class="fas fa-plus me-2"></i>إضافة صنف
          </button>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-hover table-striped">
          <thead>
            <tr>
              <th width="50%">اسم الصنف</th>
              <th width="30%">عدد المنتجات</th>
              <th width="20%">الإجراءات</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let category of categories">
              <td>
<span class="badge bg-maroon me-2">{{ category.categoryId }}</span>
                {{ category.name }}
              </td>
              <td>
                <span class="badge bg-info">{{ category.productCount }}</span>
              </td>
              <td>
                <div class="d-flex gap-2">
                  <button class="btn btn-sm btn-maroon" (click)="editCategory(category)">
                    <i class="fas fa-edit"></i> تعديل
                  </button>
                  <button class="btn btn-sm btn-outline-maroon" (click)="confirmDelete(category.categoryId)">
                    <i class="fas fa-trash"></i> حذف
                  </button>
                </div>
              </td>
            </tr>
            <tr *ngIf="categories.length === 0">
              <td colspan="3" class="text-center text-muted py-4">
                لا توجد أصناف مسجلة
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- نافذة تأكيد الحذف -->
<div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title">تأكيد الحذف</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-center py-4">
        <i class="fas fa-exclamation-triangle text-danger fa-4x mb-3"></i>
        <h5>هل أنت متأكد من حذف هذا الصنف؟</h5>
        <p class="text-muted">لا يمكن التراجع عن هذا الإجراء</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
        <button type="button" class="btn btn-danger" (click)="deleteCategory()">
          <i class="fas fa-trash me-1"></i> نعم، احذف
        </button>
      </div>
    </div>
  </div>
</div>
